name: Build, Sign & Publish nano

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

jobs:
  build-nano:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout nano repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake gettext texinfo \
            build-essential pkg-config \
            libncursesw5-dev libncurses5-dev \
            openssl jq git

      - name: Clone upstream GNU nano
        run: |
          git clone https://git.savannah.gnu.org/git/nano.git upstream-nano
          cd upstream-nano
          git checkout master
          ./autogen.sh

      - name: Configure & build nano
        run: |
          cd upstream-nano
          ./configure --prefix=/usr
          make -j"$(nproc)"

      - name: Install into staging dir
        run: |
          mkdir -p pkg
          cd upstream-nano
          make DESTDIR="$GITHUB_WORKSPACE/pkg" install

      - name: Create Debound package tarball
        run: |
          VERSION=$(cd upstream-nano && git describe --tags --always)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          tar -czf "nano-${VERSION}-debound.tar.gz" -C pkg .

      - name: Restore Ed25519 private key
        run: |
          echo "$DPM_PRIVATE_KEY_PEM" > dpm-ed25519.pem
          chmod 600 dpm-ed25519.pem
        env:
          DPM_PRIVATE_KEY_PEM: ${{ secrets.DPM_PRIVATE_KEY_PEM }}

      - name: Sign package (Ed25519) and Base64 encode
        run: |
          PKG="nano-${VERSION}-debound.tar.gz"
          openssl dgst -sha256 -sign dpm-ed25519.pem -out nano.sig "$PKG"
          SIG_B64=$(base64 -w0 nano.sig)
          echo "SIG_B64=$SIG_B64" >> "$GITHUB_ENV"

      - name: Create GitHub Release and upload package
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "nano ${{ env.VERSION }} (Debound)"
          files: |
            nano-${{ env.VERSION }}-debound.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update official Debound repo metadata
        run: |
          git clone https://github.com/debound-linux/debound-linux.github.io official
          cd official/repo

          mkdir -p packages

          cat > packages/nano.json << 'EOF'
{
  "name": "nano",
  "version": "__VERSION__",
  "channel": "stable",
  "description": "GNU nano text editor",
  "url": "__URL__",
  "signature": "__SIG__",
  "depends": ["musl", "ncurses"]
}
EOF

          sed -i "s/__VERSION__/${VERSION}/g" packages/nano.json
          sed -i "s#__URL__#https://github.com/debound-linux/nano/releases/download/${VERSION}/nano-${VERSION}-debound.tar.gz#g" packages/nano.json
          sed -i "s/__SIG__/${SIG_B64}/g" packages/nano.json

          if [ ! -f index.json ]; then
            echo '{"packages":[]}' > index.json
          fi

          jq '.packages |= (.+ ["nano"] | unique)' index.json > index.tmp
          mv index.tmp index.json

          git config user.name "debound-bot"
          git config user.email "bot@debound.local"
          git add index.json packages/nano.json

          if git diff --cached --quiet; then
            echo "No metadata changes."
            exit 0
          fi

          git commit -m "Update nano to ${VERSION}"
          git push
